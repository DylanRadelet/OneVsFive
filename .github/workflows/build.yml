name: Build OneVsFive Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build plugin
        run: dotnet build -c Release

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: OneVsFive-Plugin
          path: bin/Release/net8.0/OneVsFive.dll